# TyClaw.rs Configuration
#
# 使用方式：复制为 config.yaml，填入实际值即可
#   cp config.example.yaml config.yaml
#
# 优先级：命令行参数 > 环境变量 > providers[name] > llm 内联字段 > 默认值
#
# ╔══════════════════════════════════════════════════════════════════════╗
# ║  设计理念：                                                         ║
# ║                                                                      ║
# ║  所有模型在 [providers] 统一定义，每个模型自由选择直连或代理。       ║
# ║  主控 LLM 和子任务引擎只需引用 provider 名字。                      ║
# ║                                                                      ║
# ║  【代理模式】endpoint 指向统一中转网关（如 relay.tuyoo.com）         ║
# ║  【直连模式】endpoint 指向各 Provider 官方 API                       ║
# ║  【混合模式】部分走代理、部分直连，按需配置                          ║
# ╚══════════════════════════════════════════════════════════════════════╝

# ============================================================================
# 全局 Provider 定义 —— 每个模型独立配置，自由选择直连或代理
# ============================================================================
providers:
  # --- GPT (代理模式示例) ---
  gpt:
    endpoint: "https://relay.tuyoo.com/v1"
    api_key: "YOUR_RELAY_KEY"
    model: "openai/gpt-5.4"
    max_tokens: 65536

  # --- GPT (直连模式示例，取消注释替换上方) ---
  # gpt:
  #   endpoint: "https://api.openai.com/v1"
  #   api_key: "sk-your-openai-key"
  #   model: "gpt-5.4"
  #   max_tokens: 65536

  # --- Claude Opus (代理模式) ---
  claude-opus:
    endpoint: "https://relay.tuyoo.com/v1"
    api_key: "YOUR_RELAY_KEY"
    model: "openai/claude-opus-4.6"
    max_tokens: 65536
    thinking_enabled: true
    thinking_effort: "high"

  # --- Claude Opus (直连模式，取消注释替换上方) ---
  # claude-opus:
  #   endpoint: "https://api.anthropic.com/v1"
  #   api_key: "sk-ant-your-anthropic-key"
  #   model: "claude-opus-4-20250514"
  #   max_tokens: 65536
  #   thinking_enabled: true
  #   thinking_effort: "high"

  # --- Gemini Pro ---
  gemini-pro:
    endpoint: "https://relay.tuyoo.com/v1"
    api_key: "YOUR_RELAY_KEY"
    model: "openai/gemini-3.1-pro-preview"
    max_tokens: 65536

  # --- Kimi ---
  kimi:
    endpoint: "https://relay.tuyoo.com/v1"
    api_key: "YOUR_RELAY_KEY"
    model: "openai/kimi-k2.5"
    max_tokens: 65536

  # --- GLM ---
  glm:
    endpoint: "https://relay.tuyoo.com/v1"
    api_key: "YOUR_RELAY_KEY"
    model: "openai/glm-5"
    max_tokens: 65536

  # --- MiniMax ---
  minimax:
    endpoint: "https://relay.tuyoo.com/v1"
    api_key: "YOUR_RELAY_KEY"
    model: "openai/minimax-m2.5"
    max_tokens: 65536

  # --- 本地模型（Ollama / vLLM / LiteLLM 等）---
  # local:
  #   endpoint: "http://localhost:11434/v1"
  #   api_key: "not-needed"
  #   model: "llama3"
  #   max_tokens: 4096

  # --- OpenRouter（聚合多家模型，一个 Key 调所有）---
  # openrouter-claude:
  #   endpoint: "https://openrouter.ai/api/v1"
  #   api_key: "sk-or-your-openrouter-key"
  #   model: "anthropic/claude-sonnet-4"
  #   max_tokens: 16384

  # --- Azure OpenAI ---
  # azure-gpt:
  #   endpoint: "https://your-resource.openai.azure.com/openai/deployments/gpt-5.4/v1"
  #   api_key: "your-azure-key"
  #   model: "gpt-5.4"
  #   max_tokens: 16384

# ============================================================================
# 主控 LLM —— 引用 providers 中的名字
# ============================================================================
llm:
  provider: "gpt"                         # 引用上方 providers.gpt
  max_iterations: 99                      # Agent 最大迭代次数
  context_window_tokens: 200000           # 上下文窗口（token），按模型能力配置
  snapshot: false                          # 是否保存对话快照
  max_concurrent_llm: 4                    # LLM 并发调用上限（多个 agent loop 共享，0=使用默认值4）

  # 也支持内联配置（兼容旧格式，不设 provider 时生效）：
  # api_key: "sk-your-key"
  # api_base: "https://api.openai.com/v1"
  # model: "gpt-5.4"
  # thinking_enabled: false
  # thinking_effort: "high"

# ============================================================================
# Workspace
# ============================================================================
workspace:
  key_strategy: "user_id"                 # user_id（个人模式）| conversation（群聊模式）
  idle_timeout_secs: 1800                 # 空闲超时（秒），超过后回收 Docker 容器和临时文件。0 = 不回收

# ============================================================================
# 路径配置（可选，全部有缺省值，不配置即使用默认值）
# ============================================================================
#
# 【run-dir】通过命令行 --run-dir 指定（默认 workspace/），是整个系统的根目录。
# 必须包含以下目录和文件：
#   config/config.yaml      ← 本文件
#   config/prompts.yaml     ← 提示词配置
#   skills/                 ← 全局共享 Skill（只读挂载到容器）
#   cases/                  ← 全局案例库
#   audit/                  ← 审计日志（按天分文件）
#   logs/                   ← 运行日志
#   works/                  ← 所有用户的 workspace 数据（可通过 --works-dir 覆盖路径）
#
# 【per-user workspace】每个用户在 works/ 下有独立目录：
#   works/{bucket}/{key}/   ← bucket=md5(key)[0:2], key 由 workspace.key_strategy 决定
#   该目录整体挂载到 Docker 容器的 container_root（默认 /user）。
#   以下 paths 配置中的目录名，全部相对于这个 per-user workspace 根目录。
#
# 例如：--run-dir workspace --works-dir /data/works
#   → host: /data/works/d8/0307663902380/ 挂载到容器 /workspace/
#   → skills_dir: "skills" → host: .../0307663902380/skills/ → 容器: /workspace/skills/
#
# 因为 per-user workspace 根目录通过 volume mount 映射，host 和容器内的相对路径完全一致。
# 所以以下配置不区分 host 还是容器——写一份相对路径，两边通用。
#
# 提示词（prompts.yaml）中可用 ${VAR} 引用这些路径，运行时自动替换：
#   ${CONTAINER_ROOT}, ${SKILLS_DIR}, ${MEMORY_DIR}, ${CASES_DIR},
#   ${ATTACHMENTS_DIR}, ${TMP_DIR}, ${DISPATCHES_DIR},
#   ${GLOBAL_SKILLS_DIR}, ${GLOBAL_SKILLS_PATH}
#
# paths:
#   container_root: "/workspace"              # 容器挂载根路径（per-user workspace 挂载到此）
#   container_workdir: "/workspace"           # 容器工作目录（docker exec -w）
#   global_skills_mount: "skills"        # 全局 skills 在容器内的目录名（相对 container_root）
#   skills_dir: "_personal/skills"       # 用户私有 Skill 目录（相对 per-user workspace 根）
#   memory_dir: "memory"                 # 长期记忆目录（相对 per-user workspace 根）
#   cases_dir: "cases"                   # 私有案例目录（相对 per-user workspace 根）
#   attachments_dir: "work/attachments"  # 附件目录（相对 per-user workspace 根）
#   tmp_dir: "work/tmp"                  # 临时文件目录（相对 per-user workspace 根）
#   dispatches_dir: "work/dispatches"    # 子任务调度目录（相对 per-user workspace 根）
#   history_file: "history.jsonl"        # 会话历史文件名（在 per-user workspace 根下）
#   timer_file: "timer_jobs.json"        # 定时任务文件名（在 per-user workspace 根下）

# ============================================================================
# 钉钉机器人（可选，使用 --dingtalk 启动时需要）
# ============================================================================
# dingtalk:
#   client_id: "YOUR_DINGTALK_APP_KEY"
#   client_secret: "YOUR_DINGTALK_APP_SECRET"

# ============================================================================
# 子任务引擎 —— 多模型并行
#
# routing_rules 和 planner_model / reducer_model 直接引用 providers 中的名字。
# 无需在此重复定义 providers（全局 providers 会自动合并进来）。
# ============================================================================
subtasks:
  enabled: true
  planner_model: "gpt"                    # 任务分解/规划
  planner_thinking_enabled: true
  planner_thinking_effort: "high"
  reducer_model: "gpt"                    # 结果合并
  default_model: "gpt"                    # 无规则匹配时的默认模型
  max_concurrency: 4
  failure_policy: "best_effort"           # best_effort | fail_fast
  default_timeout_ms: 600000              # 10 分钟

  # canonical node_type:
  #   coding / reasoning / search / review / summarize / planning / general
  # compatibility aliases:
  #   coding_deep -> coding, analysis/synthesis -> reasoning,
  #   research -> search, critique -> review, design -> planning
  routing_rules:
    - node_type_pattern: "coding*"
      target_model: "claude-opus"
    - node_type_pattern: "reasoning"
      target_model: "gpt"
    - node_type_pattern: "analysis"
      target_model: "gpt"
    - node_type_pattern: "synthesis"
      target_model: "gpt"
    - node_type_pattern: "planning"
      target_model: "gpt"
    - node_type_pattern: "design"
      target_model: "gpt"
    - node_type_pattern: "review"
      target_model: "gpt"
    - node_type_pattern: "critique"
      target_model: "gpt"
    - node_type_pattern: "summarize"
      target_model: "gpt"
    - node_type_pattern: "search"
      target_model: "gemini-pro"
    - node_type_pattern: "research"
      target_model: "gemini-pro"

  # 如果某个子任务 provider 需要覆盖全局配置（如不同的 temperature），
  # 可以在这里局部定义，同名会覆盖全局：
  # providers:
  #   gpt:
  #     endpoint: "https://api.openai.com/v1"
  #     api_key: "sk-different-key"
  #     model: "gpt-5.4"
  #     temperature: 0.1
  #     max_tokens: 16384

# ============================================================================
# Web 搜索（可选）
# provider: brave | duckduckgo | bailian
#   - brave:    需要 BRAVE_API_KEY 或 api_key 字段
#   - bailian:  阿里云百炼 WebSearch MCP，需要 BAILIAN_API_KEY 或 api_key 字段 (sk-xxx)
#   - duckduckgo: 免费兜底，无需 key
# 当 brave/bailian 的 key 缺失或调用失败时，自动降级至 duckduckgo。
# ============================================================================
# web_search:
#   provider: "bailian"         # brave | duckduckgo | bailian
#   api_key: ""                 # Brave: BRAVE_API_KEY；百炼: BAILIAN_API_KEY (sk-xxx)
#   max_results: 5

# ============================================================================
# 访问控制（可选）
# ============================================================================
# control:
#   rbac:
#     enabled: true
#     default_role: "admin"
#   rate_limit:
#     enabled: false
#     per_user: 5
#     global: 20
#     window_secs: 60
#   audit:
#     enabled: true

# ============================================================================
# 日志
# ============================================================================
logging:
  level: "debug"                          # debug / info / warn / error
  file: "logs/tyclaw.log"                # 相对路径基于 workspace；CLI 模式日志只写文件不输出到屏幕
