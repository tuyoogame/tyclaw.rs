# ============================================================================
# TyClaw 全局提示词配置
# ============================================================================
#
# 主 LLM 的身份/规范 + sub-agent 提示词 + nudge 催促文本，全部集中管理。
# 修改后无需重新编译，重启即可生效。
#
# 模板变量（运行时自动替换）：
#   {max_iterations}    — sub-agent 最大迭代次数
#   {workspace}         — 工作区绝对路径
#   {context_file}      — workspace context 文件名（main_llm.md）
#   {routing_table}     — 路由规则表（从 config.yaml 动态生成）
#   {max_concurrency}   — 最大并发数
#   {exploration_iterations} — 当前探索轮次
#   {explore_max}            — 探索轮次上限
#   {consecutive_exec_in_produce} — 产出阶段连续 exec 次数
# ============================================================================


